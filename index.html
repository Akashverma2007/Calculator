<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="str" class="str">
        <div id="screen" class="screen">
            <p id="text" class="text"></p>
        </div>
        <div id="btns" >
            <button id="onecut" class="btn">X</button>
            <button id="allcut" class="btn">AC</button>
            <button class="btn" id="per">%</button>
            <button class="btn" id="div" style="background-color: orange; color:  white;">/</button>
            <button class="btn" id="seven">7</button>
            <button class="btn" id="eight">8</button>
            <button class="btn" id="nine">9</button>
            <button class="btn" id="mul" style="background-color: orange; color:  white;">*</button>
            <button class="btn" id="four">4</button>
            <button class="btn" id="five">5</button>
            <button class="btn" id="six">6</button>
            <button class="btn" id="sub" style="background-color: orange; color:  white;">-</button>
            <button class="btn" id="one">1</button>
            <button class="btn" id="two">2</button>
            <button class="btn" id="three">3</button>
            <button class="btn" id="add" style="background-color: orange; color:  white;">+</button>
            <input type="checkbox" id="col">
            <button class="btn" id="ch">mode</button>
            <button class="btn" id="zero">0</button>
            <button class="btn" id="dec">.</button>
            <button class="btn" id="equal" style="background-color: orange; color:  white;">=</button>

        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
